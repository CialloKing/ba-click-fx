<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="网页版《蔚蓝档案》点击与拖拽特效，纯 Canvas 2D 实现，零外部依赖" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💠</text></svg>" />
  <title>ba-click-fx — 蔚蓝档案点击特效</title>
</head>

<body>
  <main class="page">
    <div class="hero">
      <h1>Blue Archive Click FX</h1>
      <p style="opacity:0.6;font-size:14px;margin-top:8px;">
        <a href="https://github.com/CialloKing/ba-click-fx" target="_blank" style="color:inherit;">GitHub</a>
      </p>
    </div>
  </main>

  <!-- 底部交互提示 -->
  <div class="hint-bar" id="hintBar">
    <span>🖱 点击任意处</span>
    <span class="hint-sep">·</span>
    <span>按住拖动留下光轨</span>
    <span class="hint-sep">·</span>
    <span>按 <kbd>B</kbd> 触发中心特效</span>
    <button class="hint-dismiss" id="hintDismiss" title="关闭提示">✕</button>
  </div>

  <!-- 控制面板 -->
  <button class="panel-toggle" id="panelToggle" title="控制面板">⚙</button>
  <aside class="panel" id="panel">
    <div class="panel-header">
      <h2>控制面板</h2>
      <button class="panel-close" id="panelClose">✕</button>
    </div>

    <section class="panel-section">
      <h3>基础</h3>
      <label class="ctrl">
        <span>主题颜色</span>
        <input type="color" id="ctrlColor" value="#5c9bff" />
      </label>
      <label class="ctrl">
        <span>缩放 <output id="outScale">1.10</output></span>
        <input type="range" id="ctrlScale" min="0.5" max="3" step="0.05" value="1.10" />
      </label>
      <label class="ctrl">
        <span>透明度 <output id="outOpacity">0.50</output></span>
        <input type="range" id="ctrlOpacity" min="0.1" max="1" step="0.05" value="0.50" />
      </label>
      <label class="ctrl">
        <span>最大 DPR <output id="outDpr">1</output></span>
        <input type="range" id="ctrlDpr" min="1" max="2" step="1" value="1" />
      </label>
      <label class="ctrl">
        <span>拖尾画质 <output id="outTrailRenderScale">1.00</output></span>
        <input type="range" id="ctrlTrailRenderScale" min="0.5" max="1" step="0.05" value="1" />
      </label>
    </section>

    <section class="panel-section">
      <h3>速度</h3>
      <label class="ctrl">
        <span>点击速度 <output id="outClickSpeed">1.00</output></span>
        <input type="range" id="ctrlClickSpeed" min="0.2" max="3" step="0.05" value="1" />
      </label>
      <label class="ctrl">
        <span>拖拽速度 <output id="outTrailSpeed">1.05</output></span>
        <input type="range" id="ctrlTrailSpeed" min="0.2" max="3" step="0.05" value="1.05" />
      </label>
    </section>

    <section class="panel-section">
      <h3>拖尾</h3>
      <label class="ctrl toggle">
        <span>启用拖尾</span>
        <input type="checkbox" id="ctrlTrail" checked />
        <span class="toggle-track"></span>
      </label>
      <label class="ctrl toggle">
        <span>始终显示</span>
        <input type="checkbox" id="ctrlTrailAlways" />
        <span class="toggle-track"></span>
      </label>
      <label class="ctrl">
        <span>拖尾基础宽度 <output id="outTrailWidth">1.18</output></span>
        <input type="range" id="ctrlTrailWidth" min="0.5" max="6" step="0.1" value="1.18" />
      </label>
      <label class="ctrl">
        <span>轨迹长度 <output id="outTrailLength">900</output></span>
        <input type="range" id="ctrlTrailLength" min="100" max="2000" step="50" value="900" />
      </label>
      <label class="ctrl">
        <span>消散速度 <output id="outTrailLife">22</output></span>
        <input type="range" id="ctrlTrailLife" min="5" max="120" step="1" value="22" />
      </label>
      <label class="ctrl">
        <span>平滑 <output id="outSmooth">0.50</output></span>
        <input type="range" id="ctrlSmooth" min="0" max="0.9" step="0.05" value="0.5" />
      </label>
      <label class="ctrl">
        <span>拖尾亮度 <output id="outTrailAlpha">0.96</output></span>
        <input type="range" id="ctrlTrailAlpha" min="0.1" max="1" step="0.05" value="0.96" />
      </label>
      <label class="ctrl">
        <span>偏白程度 <output id="outTrailWhiteMix">0.26</output></span>
        <input type="range" id="ctrlTrailWhiteMix" min="0" max="1" step="0.05" value="0.26" />
      </label>
    </section>

    <section class="panel-section">
      <h3>发光</h3>
      <label class="ctrl toggle">
        <span>多层柔光</span>
        <input type="checkbox" id="ctrlFakeGlow" checked />
        <span class="toggle-track"></span>
      </label>
      <label class="ctrl toggle">
        <span>阴影发光</span>
        <input type="checkbox" id="ctrlGlow" />
        <span class="toggle-track"></span>
      </label>
      <label class="ctrl toggle">
        <span>点击柔光</span>
        <input type="checkbox" id="ctrlClickFakeGlow" checked />
        <span class="toggle-track"></span>
      </label>
    </section>

    <section class="panel-section">
      <h3>圆环</h3>
      <label class="ctrl">
        <span>旋转速度 <output id="outRingRotation">0.008</output></span>
        <input type="range" id="ctrlRingRotation" min="0" max="0.05" step="0.001" value="0.008" />
      </label>
      <label class="ctrl">
        <span>光晕强度 <output id="outRingGlow">0.35</output></span>
        <input type="range" id="ctrlRingGlow" min="0" max="1" step="0.05" value="0.35" />
      </label>
      <label class="ctrl">
        <span>弧线宽度 <output id="outRingWidth">0.90</output></span>
        <input type="range" id="ctrlRingWidth" min="0.3" max="3" step="0.1" value="0.9" />
      </label>
      <label class="ctrl">
        <span>圆环透明度 <output id="outRingAlpha">0.90</output></span>
        <input type="range" id="ctrlRingAlpha" min="0.1" max="1" step="0.05" value="0.9" />
      </label>
    </section>

    <section class="panel-section">
      <h3>碎片</h3>
      <label class="ctrl">
        <span>间距 <output id="outShardSpacing">300</output></span>
        <input type="range" id="ctrlShardSpacing" min="20" max="500" step="5" value="300" />
      </label>
      <label class="ctrl">
        <span>慢速概率 <output id="outShardChanceSlow">0.02</output></span>
        <input type="range" id="ctrlShardChanceSlow" min="0" max="1" step="0.02" value="0.02" />
      </label>
      <label class="ctrl">
        <span>快速概率 <output id="outShardChanceFast">0.12</output></span>
        <input type="range" id="ctrlShardChanceFast" min="0" max="1" step="0.02" value="0.12" />
      </label>
      <label class="ctrl">
        <span>大碎片概率 <output id="outShardLargeChance">0.80</output></span>
        <input type="range" id="ctrlShardLargeChance" min="0" max="1" step="0.05" value="0.80" />
      </label>
      <label class="ctrl">
        <span>最大数量 <output id="outMaxShards">30</output></span>
        <input type="range" id="ctrlMaxShards" min="0" max="120" step="2" value="30" />
      </label>
    </section>

    <div class="panel-actions">
      <button id="btnReset" class="btn-reset">重置默认</button>
    </div>
  </aside>

  <canvas id="sparkCanvas"></canvas>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
