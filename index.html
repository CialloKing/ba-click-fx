<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="从 Blue Archive Unity UI/FX_Touch 参数逐项移植的点击与拖拽特效。" />
  <title>Blue Archive FX_Touch 还原</title>
</head>
<body>
  <main class="content" data-fx-ui>
    <p class="eyebrow">UNITY FX_TOUCH / WEB PORT</p>
    <h1>Blue Archive<br />点击与拖拽特效</h1>
    <p class="summary">
      点击任意空白位置生成原版短圆盘、两枚溶解环与四枚随机碎片；
      按住拖动可查看 0.3 秒 TrailRenderer 轨迹和按距离生成的碎片。
    </p>
    <button id="triggerEffect" type="button">在画面中心播放</button>
    <dl class="facts">
      <div>
        <dt>点击碎片</dt>
        <dd>4 枚</dd>
      </div>
      <div>
        <dt>轨迹寿命</dt>
        <dd>0.30 s</dd>
      </div>
      <div>
        <dt>圆环寿命</dt>
        <dd>0.60 s</dd>
      </div>
    </dl>
  </main>

  <footer data-fx-ui>
    <span>按空格可在中心播放</span>
    <a href="https://www.npmjs.com/package/ba-click-fx" rel="noreferrer">ba-click-fx@1.1.14</a>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
