<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="网页版《蔚蓝档案》点击与拖拽特效，纯 Canvas 2D 实现，零外部依赖" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💠</text></svg>" />
  <title>ba-click-fx — 蔚蓝档案点击特效</title>
</head>

<body>
  <!-- 浮动标题 -->
  <div class="hero-float">
    <h1>Blue Archive Click FX</h1>
    <a href="https://github.com/CialloKing/ba-click-fx" target="_blank" class="hero-link">GitHub</a>
  </div>

  <!-- 底部交互提示 -->
  <div class="hint-bar" id="hintBar">
    <span>🖱 点击任意处</span>
    <span class="hint-sep">·</span>
    <span>按住拖动留下光轨</span>
    <span class="hint-sep">·</span>
    <span>按 <kbd>空格</kbd> 触发中心特效</span>
    <button class="hint-dismiss" id="hintDismiss" title="关闭提示">✕</button>
  </div>

  <!-- 面板遮罩层：点击面板外区域关闭面板 -->
  <div class="panel-overlay" id="panelOverlay"></div>

  <!-- 控制面板 -->
  <button class="panel-toggle" id="panelToggle" title="控制面板">⚙</button>
  <aside class="panel" id="panel">
    <div class="panel-header">
      <h2>控制面板</h2>
      <div class="panel-header-actions">
        <button class="panel-pin" id="panelPin" title="固定面板">📌</button>
        <button class="panel-close" id="panelClose">✕</button>
      </div>
    </div>

    <!-- ── 基础 ── -->
    <section class="panel-section">
      <h3>基础</h3>
      <label class="ctrl">
        <span>主题颜色</span>
        <input type="color" id="ctrlColor" value="#69a1ff" />
      </label>
      <label class="ctrl">
        <span>全局缩放 <output id="outScale">1.10</output></span>
        <input type="range" id="ctrlScale" min="0.5" max="3" step="0.05" value="1.10" />
      </label>
      <label class="ctrl">
        <span>透明度 <output id="outOpacity">0.50</output></span>
        <input type="range" id="ctrlOpacity" min="0.1" max="1" step="0.05" value="0.50" />
      </label>
      <label class="ctrl">
        <span>最大 DPR <output id="outDpr">1</output></span>
        <input type="range" id="ctrlDpr" min="1" max="2" step="1" value="1" />
      </label>
      <label class="ctrl">
        <span>拖尾画质 <output id="outTrailRenderScale">1.00</output></span>
        <input type="range" id="ctrlTrailRenderScale" min="0.5" max="1" step="0.05" value="1" />
      </label>
    </section>

    <!-- ── 背景主题 ── -->
    <section class="panel-section">
      <h3>背景主题</h3>
      <div class="theme-presets" id="themePresets">
        <button class="theme-btn active" data-theme="蔚蓝" style="background: radial-gradient(circle at 30% 20%, #1d3558 0%, #101827 45%, #080d16 100%);" title="蔚蓝（默认）"></button>
        <button class="theme-btn" data-theme="深紫" style="background: radial-gradient(circle at 30% 20%, #2d1b4e 0%, #1a1028 45%, #0d0616 100%);" title="深紫"></button>
        <button class="theme-btn" data-theme="深绿" style="background: radial-gradient(circle at 30% 20%, #1a3d2a 0%, #0f1a14 45%, #080d0a 100%);" title="深绿"></button>
        <button class="theme-btn" data-theme="暖金" style="background: radial-gradient(circle at 30% 20%, #3d2a1a 0%, #1f1910 45%, #14100a 100%);" title="暖金"></button>
        <button class="theme-btn" data-theme="纯黑" style="background: #0a0a0f;" title="纯黑"></button>
        <button class="theme-btn" data-theme="custom" style="background: conic-gradient(#666 0deg 90deg, #999 90deg 180deg, #666 180deg 270deg, #999 270deg 360deg);" title="自定义"></button>
      </div>
      <label class="ctrl custom-bg-ctrl" id="customBgCtrl" style="display:none;">
        <span>自定义背景</span>
      </label>
      <input type="text" class="custom-bg-input" id="ctrlCustomBg" placeholder="CSS background 值或图片 URL…" style="display:none;" />
      <button class="btn-reset custom-bg-apply" id="btnApplyBg" style="display:none;">应用背景</button>
    </section>

    <!-- ── 点击特效 ── -->
    <section class="panel-section">
      <h3>点击特效</h3>
      <label class="ctrl">
        <span>播放速度 <output id="outClickSpeed">1.00</output></span>
        <input type="range" id="ctrlClickSpeed" min="0.2" max="3" step="0.05" value="1" />
      </label>
      <label class="ctrl">
        <span>碎片数量 <output id="outSparksCount">4</output></span>
        <input type="range" id="ctrlSparksCount" min="0" max="12" step="1" value="4" />
      </label>
      <label class="ctrl">
        <span>特效时长 <output id="outClickTotalLife">27</output></span>
        <input type="range" id="ctrlClickTotalLife" min="10" max="60" step="1" value="27" />
      </label>
      <label class="ctrl">
        <span>点击缩放 <output id="outClickScaleMul">1.30</output></span>
        <input type="range" id="ctrlClickScaleMul" min="0.5" max="3" step="0.05" value="1.3" />
      </label>
      <label class="ctrl">
        <span>光晕半径 <output id="outClickHaloRadius">96</output></span>
        <input type="range" id="ctrlClickHaloRadius" min="30" max="200" step="2" value="96" />
      </label>
      <label class="ctrl toggle">
        <span>点击柔光</span>
        <input type="checkbox" id="ctrlClickFakeGlow" checked />
        <span class="toggle-track"></span>
      </label>

      <h4 class="sub-heading">碎片</h4>
      <label class="ctrl">
        <span>间距 <output id="outShardSpacing">220</output></span>
        <input type="range" id="ctrlShardSpacing" min="20" max="500" step="5" value="220" />
      </label>
      <label class="ctrl">
        <span>慢速概率 <output id="outShardChanceSlow">0.04</output></span>
        <input type="range" id="ctrlShardChanceSlow" min="0" max="1" step="0.02" value="0.04" />
      </label>
      <label class="ctrl">
        <span>快速概率 <output id="outShardChanceFast">0.18</output></span>
        <input type="range" id="ctrlShardChanceFast" min="0" max="1" step="0.02" value="0.18" />
      </label>
      <label class="ctrl">
        <span>大碎片概率 <output id="outShardLargeChance">0.62</output></span>
        <input type="range" id="ctrlShardLargeChance" min="0" max="1" step="0.05" value="0.62" />
      </label>
      <label class="ctrl">
        <span>最大数量 <output id="outMaxShards">38</output></span>
        <input type="range" id="ctrlMaxShards" min="0" max="120" step="2" value="38" />
      </label>

      <h4 class="sub-heading">圆环</h4>
      <label class="ctrl">
        <span>旋转速度 <output id="outRingRotation">0.008</output></span>
        <input type="range" id="ctrlRingRotation" min="0" max="0.05" step="0.001" value="0.008" />
      </label>
      <label class="ctrl">
        <span>光晕强度 <output id="outRingGlow">0.35</output></span>
        <input type="range" id="ctrlRingGlow" min="0" max="1" step="0.05" value="0.35" />
      </label>
      <label class="ctrl">
        <span>弧线宽度 <output id="outRingWidth">0.90</output></span>
        <input type="range" id="ctrlRingWidth" min="0.3" max="3" step="0.1" value="0.9" />
      </label>
      <label class="ctrl">
        <span>透明度 <output id="outRingAlpha">0.90</output></span>
        <input type="range" id="ctrlRingAlpha" min="0.1" max="1" step="0.05" value="0.9" />
      </label>
      <label class="ctrl">
        <span>出现延迟 <output id="outRingDelay">2</output></span>
        <input type="range" id="ctrlRingDelay" min="0" max="10" step="0.5" value="2" />
      </label>
      <label class="ctrl">
        <span>总时长 <output id="outRingMaxLife">27</output></span>
        <input type="range" id="ctrlRingMaxLife" min="10" max="60" step="1" value="27" />
      </label>
      <label class="ctrl">
        <span>起始半径倍率 <output id="outRingBaseRadiusMul">0.47</output></span>
        <input type="range" id="ctrlRingBaseRadiusMul" min="0.2" max="1" step="0.05" value="0.47" />
      </label>
      <label class="ctrl">
        <span>扩张量 <output id="outRingPostDiskGrow">24</output></span>
        <input type="range" id="ctrlRingPostDiskGrow" min="5" max="60" step="1" value="24" />
      </label>
      <label class="ctrl">
        <span>发光半径 <output id="outRingGlowRadiusAdd">54</output></span>
        <input type="range" id="ctrlRingGlowRadiusAdd" min="10" max="150" step="2" value="54" />
      </label>
      <label class="ctrl">
        <span>柔光半径 <output id="outRingSoftGlowRadiusAdd">96</output></span>
        <input type="range" id="ctrlRingSoftGlowRadiusAdd" min="20" max="200" step="2" value="96" />
      </label>
    </section>

    <!-- ── 拖尾轨迹 ── -->
    <section class="panel-section">
      <h3>拖尾轨迹</h3>
      <label class="ctrl toggle">
        <span>启用拖尾</span>
        <input type="checkbox" id="ctrlTrail" checked />
        <span class="toggle-track"></span>
      </label>
      <label class="ctrl toggle">
        <span>始终显示</span>
        <input type="checkbox" id="ctrlTrailAlways" />
        <span class="toggle-track"></span>
      </label>
      <label class="ctrl">
        <span>拖拽速度 <output id="outTrailSpeed">1.05</output></span>
        <input type="range" id="ctrlTrailSpeed" min="0.2" max="3" step="0.05" value="1.05" />
      </label>
      <label class="ctrl">
        <span>基础宽度 <output id="outTrailWidth">3.00</output></span>
        <input type="range" id="ctrlTrailWidth" min="0.5" max="6" step="0.1" value="3" />
      </label>
      <label class="ctrl">
        <span>轨迹长度 <output id="outTrailLength">900</output></span>
        <input type="range" id="ctrlTrailLength" min="100" max="2000" step="50" value="900" />
      </label>
      <label class="ctrl">
        <span>消散速度 <output id="outTrailLife">22</output></span>
        <input type="range" id="ctrlTrailLife" min="5" max="120" step="1" value="22" />
      </label>
      <label class="ctrl">
        <span>平滑 <output id="outSmooth">0.50</output></span>
        <input type="range" id="ctrlSmooth" min="0" max="0.9" step="0.05" value="0.5" />
      </label>
      <label class="ctrl">
        <span>亮度 <output id="outTrailAlpha">0.96</output></span>
        <input type="range" id="ctrlTrailAlpha" min="0.1" max="1" step="0.05" value="0.96" />
      </label>
      <label class="ctrl">
        <span>偏白程度 <output id="outTrailWhiteMix">0.08</output></span>
        <input type="range" id="ctrlTrailWhiteMix" min="0" max="1" step="0.01" value="0.08" />
      </label>
      <label class="ctrl toggle">
        <span>多层柔光</span>
        <input type="checkbox" id="ctrlFakeGlow" checked />
        <span class="toggle-track"></span>
      </label>
      <label class="ctrl toggle">
        <span>阴影发光</span>
        <input type="checkbox" id="ctrlGlow" />
        <span class="toggle-track"></span>
      </label>
    </section>

    <!-- ── 拖尾图层 ── -->
    <section class="panel-section">
      <h3>拖尾图层</h3>
      <label class="ctrl">
        <span>主轨迹 <output id="outTrailMainAlpha">1.00</output></span>
        <input type="range" id="ctrlTrailMainAlpha" min="0" max="1" step="0.05" value="1" />
      </label>
      <label class="ctrl">
        <span>中心高光 <output id="outTrailCoreAlpha">0.78</output></span>
        <input type="range" id="ctrlTrailCoreAlpha" min="0" max="1" step="0.05" value="0.78" />
      </label>
      <label class="ctrl">
        <span>蓝白热点 <output id="outTrailHotAlpha">0.34</output></span>
        <input type="range" id="ctrlTrailHotAlpha" min="0" max="1" step="0.05" value="0.34" />
      </label>
      <label class="ctrl">
        <span>蓝色发光 <output id="outTrailGlowAlpha">0.18</output></span>
        <input type="range" id="ctrlTrailGlowAlpha" min="0" max="1" step="0.02" value="0.18" />
      </label>
      <label class="ctrl">
        <span>柔和外光 <output id="outTrailSoftGlowAlpha">0.05</output></span>
        <input type="range" id="ctrlTrailSoftGlowAlpha" min="0" max="0.5" step="0.005" value="0.045" />
      </label>
      <label class="ctrl">
        <span>细轨 <output id="outTrailRailAlpha">0.02</output></span>
        <input type="range" id="ctrlTrailRailAlpha" min="0" max="0.3" step="0.01" value="0.02" />
      </label>
      <label class="ctrl">
        <span>发光宽度 <output id="outTrailGlowWidthMul">1.70</output></span>
        <input type="range" id="ctrlTrailGlowWidthMul" min="0.3" max="8" step="0.1" value="1.7" />
      </label>
      <label class="ctrl">
        <span>柔光宽度 <output id="outTrailSoftGlowWidthMul">2.40</output></span>
        <input type="range" id="ctrlTrailSoftGlowWidthMul" min="0.5" max="15" step="0.1" value="2.4" />
      </label>
    </section>

    <!-- ── 拖尾消散 ── -->
    <section class="panel-section">
      <h3>拖尾消散</h3>
      <label class="ctrl">
        <span>尾部衰减 <output id="outTrailTailDecayMul">1.28</output></span>
        <input type="range" id="ctrlTrailTailDecayMul" min="0.1" max="5" step="0.05" value="1.28" />
      </label>
      <label class="ctrl">
        <span>头部衰减 <output id="outTrailHeadDecayMul">0.95</output></span>
        <input type="range" id="ctrlTrailHeadDecayMul" min="0.1" max="5" step="0.05" value="0.95" />
      </label>
      <label class="ctrl">
        <span>松手衰减 <output id="outTrailReleaseDecayMul">1.18</output></span>
        <input type="range" id="ctrlTrailReleaseDecayMul" min="0.5" max="8" step="0.05" value="1.18" />
      </label>
      <label class="ctrl">
        <span>速度衰减 <output id="outTrailSpeedDecay">0.988</output></span>
        <input type="range" id="ctrlTrailSpeedDecay" min="0.8" max="0.999" step="0.001" value="0.988" />
      </label>
      <label class="ctrl">
        <span>最小速度 <output id="outTrailSpeedMin">0.035</output></span>
        <input type="range" id="ctrlTrailSpeedMin" min="0.005" max="0.5" step="0.005" value="0.035" />
      </label>
      <label class="ctrl">
        <span>最大速度 <output id="outTrailSpeedMax">2.20</output></span>
        <input type="range" id="ctrlTrailSpeedMax" min="0.5" max="5" step="0.05" value="2.2" />
      </label>
    </section>

    <div class="panel-actions">
      <button id="btnReset" class="btn-reset">重置默认</button>
    </div>
  </aside>

  <canvas id="sparkCanvas"></canvas>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
